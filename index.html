<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Budget Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="status" style="font-size: 0.8rem; color: #666; text-align: right; margin-bottom: 10px;">
        Завантаження статусу...
    </div>

    <h2>IT Project Estimator</h2>
    <h2>IT Project Estimator</h2>
    <div class="input-group">
        <label>Тип проєкту</label>
        <select id="projectType">
            <option value="web">Web App</option>
            <option value="mobile">Mobile App</option>
            <option value="landing">Landing Page</option>
        </select>
    </div>
    <div class="input-group">
        <label>Кількість годин</label>
        <input type="number" id="hoursInput" placeholder="Наприклад, 100">
    </div>
    <div class="input-group">
        <label>Ставка ($ / год)</label>
        <input type="number" id="rateInput" placeholder="Наприклад, 30">
    </div>
    <button id="calcBtn">Розрахувати вартість</button>

    <div id="resultArea" class="result" style="display: none;">
        <div>Загальна сума: <span id="totalPrice" style="font-size: 1.5rem; font-weight: bold;">0</span> $</div>
        <div id="statusLabel" class="status"></div>
    </div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
